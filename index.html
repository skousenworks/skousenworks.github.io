<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skousen Works | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes drive { 
            0% { transform: translateX(-10vw); }
            100% { transform: translateX(110vw); }
        }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }
        .animate-drive { animation: drive 15s linear infinite; }
    </style>
</head>
<body class="bg-[#0b1121] text-white font-sans overflow-x-hidden relative">

    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none">
        <svg class="absolute -top-16 -right-16 fill-slate-700 animate-spin-slow" width="300" height="300" viewBox="0 0 100 100">
            <path d="M50 10l5 15h10l5-15 10 5-5 15h10l5-15 10 5v15l-10 5v10l10 5v15l-10 5v10l-10 5v-15h-10l-5 15-10-5 5-15h-10l-5 15-10-5v-15l10-5v-10l-10-5v-15l10-5z"></path>
        </svg>
        <svg class="absolute bottom-10 left-0 animate-drive fill-emerald-500 opacity-30" width="100" height="60" viewBox="0 0 100 60">
            <path d="M10 40h70v15h-70zM20 25h15l10-15h20l10 15h15l-5 15h-65z"></path>
            <circle cx="25" cy="50" r="8"></circle><circle cx="75" cy="50" r="8"></circle>
        </svg>
    </div>

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0b1121]/80 backdrop-blur-md sticky top-0 z-50">
        <span class="text-xl font-bold tracking-tighter">SKOUSEN<span class="text-blue-500">WORKS</span></span>
        <div class="space-x-6 text-sm font-medium">
            <a href="#projects" class="hover:text-blue-400 transition">Projects</a>
            <a href="https://github.com/skousenworks" class="hover:text-blue-400 transition">GitHub</a>
        </div>
    </nav>

    <header class="py-20 px-6 text-center max-w-4xl mx-auto">
        <h2 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic">Precision Engineering.</h2>
        <p class="text-lg text-slate-400">Mechanical Designer specialized in CATIA & SolidWorks.</p>
    </header>

    <section id="projects" class="max-w-5xl mx-auto p-6 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 hover:border-red-500 transition-all text-center backdrop-blur-sm">
                <div class="w-full h-64 bg-slate-900 rounded-xl overflow-hidden mb-4">
                    <model-viewer 
                        src="Honda Logo Stand.glb" 
                        auto-rotate camera-controls
                        style="width: 100%; height: 100%; filter: brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(10);">
                    </model-viewer>
                </div>
                <h4 class="font-bold text-red-400">Honda Red Edition</h4>
            </div>

            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 hover:border-blue-400 transition-all text-center backdrop-blur-sm">
                <div class="w-full h-64 bg-slate-900 rounded-xl overflow-hidden mb-4">
                    <model-viewer 
                        src="Honda Logo Stand.glb" 
                        auto-rotate camera-controls
                        style="width: 100%; height: 100%; filter: brightness(1.5);">
                    </model-viewer>
                </div>
                <h4 class="font-bold text-white">Championship White Edition</h4>
            </div>
        </div>
    </section>
</body>
</html>
