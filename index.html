<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skousen Works | Mechanical Design & Manufacturing Automation</title>

  <style>
    :root {
      --bg: #f7f7f9;
      --text: #1e1e24;
      --muted: #5c6670;
      --brand: #2d6cdf;      
      --card: #ffffff;
      --radius: 14px;
      --s-3: 16px;
      --s-5: 32px;
      --s-7: 72px;
      --s-8: 96px;
    }

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.55;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { color: var(--brand); text-decoration: none; transition: 0.2s; }
    a:hover { opacity: 0.8; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 var(--s-3); }

    /* Nav */
    nav {
      background: #0f172a; padding: 1rem 0;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-content { display: flex; justify-content: space-between; width: 100%; align-items: center; }
    .logo { color: #fff; font-weight: 700; font-size: 1.2rem; }
    .nav-links a { color: #fff; margin-left: var(--s-3); font-size: 0.9rem; }

    /* Hero */
    .hero {
      position: relative; isolation: isolate; overflow: hidden;
      background: #0f172a; color: #fff; min-height: 60vh;
      display: flex; align-items: center;
    }
    .hero__media { position: absolute; inset: 0; z-index: 0; }
    .hero__media img {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(0.1) brightness(0.4);
    }
    .hero__content { position: relative; z-index: 2; padding: var(--s-8) 0; text-align: center; width: 100%; }
    .hero h1 { font-size: clamp(32px, 5vw, 56px); margin-bottom: var(--s-3); }
    .hero p { max-width: 700px; margin: 0 auto var(--s-5); color: #e5e7eb; font-size: 1.1rem; }

    /* Buttons */
    .btn {
      display: inline-block; padding: 14px 28px; border-radius: 10px; font-weight: 600;
      background: var(--brand); color: #fff; border: none; cursor: pointer;
    }
    .btn--ghost { background: transparent; border: 1px solid rgba(255,255,255,0.4); margin-left: 10px; }

    /* Sections & Grid */
    section { padding: var(--s-7) 0; }
    h2 { text-align: center; margin-bottom: var(--s-5); font-size: 2rem; }
    
    .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    
    .card {
      background: var(--card); border-radius: var(--radius); padding: var(--s-5);
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
