<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skousen Works | Precision Weldment Jigs & Mechanical Design</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
      --radius: 12px;
      --transition: all 0.3s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    a { text-decoration: none; color: inherit; transition: var(--transition); }

    /* Navigation */
    nav {
      height: 80px;
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-content { display: flex; justify-content: space-between; width: 100%; align-items: center; }
    .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
    .logo span { color: var(--accent); }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a { margin-left: 2rem; font-size: 0.9rem; font-weight: 500; }

    /* Hero Section */
    .hero {
      padding: 120px 0;
      text-align: center;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
    }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); line-height: 1.1; margin-bottom: 1.5rem; font-weight: 800; }
    .hero p { max-width: 650px; margin: 0 auto 2.5rem; color: var(--muted); font-size: 1.2rem; }
    
    .btn { padding: 14px 28px; border-radius: 8px; font-weight: 600; display: inline-block; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }

    /* Layout Sections */
    section { padding: 100px 0; }
    .section-title { text-align: center; margin-bottom: 4rem; }
    .section-title h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .section-title p { color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
